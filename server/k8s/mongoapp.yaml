apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongoapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongoapp
  template:
    metadata:
      labels:
        app: mongoapp
    spec:
      containers:
      - name: mongoapp
        image: nodeapp
        ports:
        - containerPort: 3030
---
apiVersion: v1
kind: Service
metadata:
  name: mongoapp
spec:
  selector:
    app: mongoapp
  ports:
    - protocol: TCP
      port: 3030
      targetPort: 3030
