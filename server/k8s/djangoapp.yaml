apiVersion: apps/v1
kind: Deployment
metadata:
  name: djangoapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: djangoapp
  template:
    metadata:
      labels:
        app: djangoapp
    spec:
      containers:
      - name: djangoapp
        image: djangoproj
        ports:
        - containerPort: 8000
        env:
        - name: backend_url
          value: "http://mongoapp:3030"
        - name: sentiment_analyzer_url
          value: "http://sentiment:5050"
---
apiVersion: v1
kind: Service
metadata:
  name: djangoapp
spec:
  selector:
    app: djangoapp
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: LoadBalancer
