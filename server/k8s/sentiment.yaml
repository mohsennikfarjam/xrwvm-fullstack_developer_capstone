apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentiment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentiment
  template:
    metadata:
      labels:
        app: sentiment
    spec:
      containers:
      - name: sentiment
        image: sentiment_analyzer
        ports:
        - containerPort: 5050
---
apiVersion: v1
kind: Service
metadata:
  name: sentiment
spec:
  selector:
    app: sentiment
  ports:
    - protocol: TCP
      port: 5050
      targetPort: 5050
